name: CIOOS Deploy Docker Compose
description: Deploy a Docker Compose project to a remote server over WireGuard VPN

inputs:
  wireguard_interface:
    description: "WireGuard interface name"
    required: false
    default: "wg0"
  wg_config:
    description: "Full WireGuard config file content"
    required: false
    default: ""
  ssh_host:
    description: "Remote SSH host"
    required: true
  ssh_port:
    description: "Remote SSH port"
    required: false
    default: "22"
  ssh_username:
    description: "Remote SSH username"
    required: true
  ssh_key:
    description: "SSH private key for remote connection"
    required: true
  ssh_passphrase:
    description: "SSH key passphrase"
    required: false
    default: ""
  deploy_path:
    description: "Remote path where the project gets deployed"
    required: true
  stack_name:
    description: "Docker Compose stack/project name"
    required: true
  compose_files:
    description: "Space-separated list of docker compose files (e.g. 'docker-compose.yml docker-compose.prod.yml')"
    required: false
    default: "docker-compose.yml"
  op_secret_files:
    description: "Space-separated list of files to inject 1Password secrets into"
    required: false
    default: ""
  op_service_account_token:
    description: "1Password service account token"
    required: false
    default: ""
  docker_compose_down:
    description: "Run docker compose down before up"
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Install WireGuard
      if: inputs.wg_config != ''
      shell: bash
      run: |
        sudo apt-get install -y wireguard

    - name: Configure and start WireGuard
      if: inputs.wg_config != ''
      shell: bash
      run: |
        # Strip the DNS directive so wg-quick doesn't override the runner's DNS resolver
        echo "${{ inputs.wg_config }}" | sed '/^DNS\s*=/Id' | sudo tee /etc/wireguard/${{ inputs.wireguard_interface }}.conf > /dev/null
        sudo chmod 600 /etc/wireguard/${{ inputs.wireguard_interface }}.conf
        sudo wg-quick up ${{ inputs.wireguard_interface }}

    - name: Verify WireGuard connection
      if: inputs.wg_config != ''
      shell: bash
      run: |
        sudo wg show ${{ inputs.wireguard_interface }}
        ping -c 3 ${{ inputs.ssh_host }}

    - name: Setup SSH
      shell: bash
      run: |
        mkdir -p ~/.ssh
        echo "${{ inputs.ssh_key }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -p ${{ inputs.ssh_port }} ${{ inputs.ssh_host }} >> ~/.ssh/known_hosts 2>/dev/null

    - name: Sync repo to remote server
      shell: bash
      run: |
        SSH_CMD="ssh -i ~/.ssh/deploy_key -p ${{ inputs.ssh_port }} ${{ inputs.ssh_username }}@${{ inputs.ssh_host }}"
        REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
        REF="${GITHUB_HEAD_REF:-${GITHUB_REF}}"
        ${SSH_CMD} bash -s -- "${REPO_URL}" "${REF}" <<'REMOTE_SCRIPT'
          set -e
          REPO_URL="$1"
          REF="$2"
          if [ -d "${{ inputs.deploy_path }}/.git" ]; then
            cd "${{ inputs.deploy_path }}"
            git remote set-url origin "${REPO_URL}"
            git fetch origin
            git checkout "${REF}" -- || git checkout -b "${REF}" "origin/${REF}"
            git pull origin "${REF}"
          else
            git clone --branch "${REF}" "${REPO_URL}" "${{ inputs.deploy_path }}"
          fi
        REMOTE_SCRIPT
      env:
        GITHUB_TOKEN: ${{ github.token }}

    - name: Inject 1Password secrets on remote host
      if: inputs.op_secret_files != ''
      shell: bash
      run: |
        SSH_CMD="ssh -i ~/.ssh/deploy_key -p ${{ inputs.ssh_port }} ${{ inputs.ssh_username }}@${{ inputs.ssh_host }}"
        ${SSH_CMD} bash -s <<REMOTE_SCRIPT
          set -e
          export OP_SERVICE_ACCOUNT_TOKEN="${OP_SERVICE_ACCOUNT_TOKEN}"
          cd ${{ inputs.deploy_path }}
          for file in ${{ inputs.op_secret_files }}; do
            echo "Injecting secrets into \${file}"
            op inject -i "\${file}" -o "\${file}.injected"
            mv "\${file}.injected" "\${file}"
          done
        REMOTE_SCRIPT
      env:
        OP_SERVICE_ACCOUNT_TOKEN: ${{ inputs.op_service_account_token }}

    - name: Deploy with Docker Compose
      shell: bash
      run: |
        SSH_CMD="ssh -i ~/.ssh/deploy_key -p ${{ inputs.ssh_port }} ${{ inputs.ssh_username }}@${{ inputs.ssh_host }}"
        FLAGS=""
        for f in ${{ inputs.compose_files }}; do
          FLAGS="${FLAGS} -f ${f}"
        done
        COMPOSE="docker compose -p ${{ inputs.stack_name }} ${FLAGS}"

        SCRIPT="set -e && cd ${{ inputs.deploy_path }} && ${COMPOSE} build --pull"
        if [ "${{ inputs.docker_compose_down }}" = "true" ]; then
          SCRIPT="${SCRIPT} && ${COMPOSE} down --remove-orphans"
        fi
        SCRIPT="${SCRIPT} && ${COMPOSE} up -d --remove-orphans && docker image prune -f"

        ${SSH_CMD} "${SCRIPT}"

    - name: Tear down WireGuard
      if: always() && inputs.wg_config != ''
      shell: bash
      run: sudo wg-quick down ${{ inputs.wireguard_interface }}
