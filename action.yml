name: CIOOS Deploy Docker Compose
description: Deploy a Docker Compose project to a remote server over WireGuard VPN

inputs:
  wireguard_interface:
    description: "WireGuard interface name"
    required: false
    default: "wg0"
  wg_config:
    description: "Full WireGuard config file content"
    required: false
    default: ""
  ssh_host:
    description: "Remote SSH host"
    required: true
  ssh_port:
    description: "Remote SSH port"
    required: false
    default: "22"
  ssh_username:
    description: "Remote SSH username"
    required: true
  ssh_key:
    description: "SSH private key for remote connection"
    required: true
  deploy_path:
    description: "Remote path where the project gets deployed"
    required: true
  stack_name:
    description: "Docker Compose stack/project name"
    required: true
  compose_files:
    description: "Space-separated list of docker compose files (e.g. 'docker-compose.yml docker-compose.prod.yml')"
    required: false
    default: "docker-compose.yml"
  op_secret_files:
    description: "Space-separated list of files to inject 1Password secrets into"
    required: false
    default: ""
  op_service_account_token:
    description: "1Password service account token"
    required: false
    default: ""
  docker_compose_down:
    description: "Run docker compose down before up"
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Install WireGuard
      if: inputs.wg_config != ''
      shell: bash
      run: sudo apt-get install -y wireguard

    - name: Configure and start WireGuard
      if: inputs.wg_config != ''
      shell: bash
      run: |
        echo "${{ inputs.wg_config }}" | sed '/^DNS\s*=/Id' | sudo tee /etc/wireguard/${{ inputs.wireguard_interface }}.conf > /dev/null
        sudo chmod 600 /etc/wireguard/${{ inputs.wireguard_interface }}.conf
        sudo wg-quick up ${{ inputs.wireguard_interface }}

    - name: Verify WireGuard connection
      if: inputs.wg_config != ''
      shell: bash
      run: |
        sudo wg show ${{ inputs.wireguard_interface }}
        ping -c 3 ${{ inputs.ssh_host }}

    - name: Setup SSH
      shell: bash
      run: |
        mkdir -p ~/.ssh
        echo "${{ inputs.ssh_key }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -p ${{ inputs.ssh_port }} ${{ inputs.ssh_host }} >> ~/.ssh/known_hosts 2>/dev/null

    - name: Sync repo to remote server
      shell: bash
      run: |
        SSH_CMD="ssh -i ~/.ssh/deploy_key -p ${{ inputs.ssh_port }} ${{ inputs.ssh_username }}@${{ inputs.ssh_host }}"
        REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
        REF="${GITHUB_HEAD_REF:-${GITHUB_REF}}"
        REF="${REF#refs/heads/}"
        echo "::notice::Syncing ${GITHUB_REPOSITORY} (ref: ${REF}) to ${{ inputs.ssh_host }}:${{ inputs.deploy_path }}"
        echo "::group::Git sync output"
        ${SSH_CMD} bash -s -- "${REPO_URL}" "${REF}" <<'REMOTE_SCRIPT'
          set -e
          REPO_URL="$1"
          REF="$2"
          if [ -d "${{ inputs.deploy_path }}/.git" ]; then
            echo "Existing repo found, pulling latest changes..."
            cd "${{ inputs.deploy_path }}"
            git remote set-url origin "${REPO_URL}"
            git fetch origin
            git checkout -f "${REF}" || git checkout -b "${REF}" "origin/${REF}"
            git reset --hard "origin/${REF}"
          else
            echo "Cloning repository..."
            git clone --branch "${REF}" "${REPO_URL}" "${{ inputs.deploy_path }}"
          fi
          echo "Repo sync complete."
        REMOTE_SCRIPT
        echo "::endgroup::"
        echo "DEPLOY_START=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
      env:
        GITHUB_TOKEN: ${{ github.token }}

    - name: Inject 1Password secrets on remote host
      if: inputs.op_secret_files != ''
      shell: bash
      run: |
        SSH_CMD="ssh -i ~/.ssh/deploy_key -p ${{ inputs.ssh_port }} ${{ inputs.ssh_username }}@${{ inputs.ssh_host }}"
        echo "::notice::Injecting 1Password secrets into: ${{ inputs.op_secret_files }}"
        echo "::group::1Password injection output"
        SCRIPT="set -e && cd ${{ inputs.deploy_path }}"
        SCRIPT="${SCRIPT} && export OP_SERVICE_ACCOUNT_TOKEN='${{ inputs.op_service_account_token }}'"
        for file in ${{ inputs.op_secret_files }}; do
          SCRIPT="${SCRIPT} && echo 'Injecting secrets into ${file}...' && op inject -i '${file}' -o '${file}.injected' && mv '${file}.injected' '${file}'"
        done
        SCRIPT="${SCRIPT} && echo '1Password secret injection complete.'"
        ${SSH_CMD} "${SCRIPT}"
        echo "::endgroup::"

    - name: Deploy with Docker Compose
      shell: bash
      run: |
        SSH_CMD="ssh -i ~/.ssh/deploy_key -p ${{ inputs.ssh_port }} ${{ inputs.ssh_username }}@${{ inputs.ssh_host }}"
        FLAGS=""
        for f in ${{ inputs.compose_files }}; do
          FLAGS="${FLAGS} -f ${f}"
        done
        COMPOSE="docker compose -p ${{ inputs.stack_name }} ${FLAGS}"
        echo "::notice::Deploying stack '${{ inputs.stack_name }}' to ${{ inputs.ssh_host }}"
        echo "::group::Building images"
        SCRIPT="set -e && cd ${{ inputs.deploy_path }} && echo 'Building images...' && ${COMPOSE} build --pull"
        if [ "${{ inputs.docker_compose_down }}" = "true" ]; then
          SCRIPT="${SCRIPT} && echo '::endgroup::' && echo '::group::Stopping existing containers' && ${COMPOSE} down --remove-orphans"
          SCRIPT="${SCRIPT} && echo 'Waiting for all containers to be removed...'"
          SCRIPT="${SCRIPT} && for i in \$(seq 1 30); do [ -z \"\$(docker ps -q -f label=com.docker.compose.project=${{ inputs.stack_name }})\" ] && break; echo \"Waiting... (\${i}/30)\"; sleep 2; done"
          SCRIPT="${SCRIPT} && echo '::endgroup::' && echo '::group::Starting containers' && ${COMPOSE} up -d --remove-orphans"
        else
          SCRIPT="${SCRIPT} && echo '::endgroup::' && echo '::group::Starting containers' && ${COMPOSE} up -d --remove-orphans"
        fi
        SCRIPT="${SCRIPT} && echo '::endgroup::' && echo '::group::Pruning unused images' && docker image prune -f"
        SCRIPT="${SCRIPT} && echo '::endgroup::'"
        if ${SSH_CMD} "${SCRIPT}"; then
          echo "DEPLOY_RESULT=success" >> "$GITHUB_ENV"
        else
          DEPLOY_ERROR="$(${SSH_CMD} "cd ${{ inputs.deploy_path }} && ${COMPOSE} ps 2>&1 | head -20" || echo 'Unable to retrieve container status')"
          echo "DEPLOY_RESULT=failed" >> "$GITHUB_ENV"
          {
            echo "DEPLOY_ERROR<<EOF"
            echo "$DEPLOY_ERROR"
            echo "EOF"
          } >> "$GITHUB_ENV"
          exit 1
        fi

    - name: Write job summary
      if: always()
      shell: bash
      run: |
        REF="${GITHUB_HEAD_REF:-${GITHUB_REF}}"
        REF_NAME="${REF#refs/heads/}"
        DEPLOY_END="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        STATUS="${{ job.status }}"
        if [ "${STATUS}" = "success" ]; then
          ICON="✅"
        else
          ICON="❌"
        fi
        {
          echo "## ${ICON} Deploy Summary"
          echo ""
          echo "| | |"
          echo "|---|---|"
          echo "| **Stack** | \`${{ inputs.stack_name }}\` |"
          echo "| **Host** | \`${{ inputs.ssh_host }}\` |"
          echo "| **Path** | \`${{ inputs.deploy_path }}\` |"
          echo "| **Branch / Ref** | \`${REF_NAME}\` |"
          echo "| **Compose files** | \`${{ inputs.compose_files }}\` |"
          echo "| **Compose down** | \`${{ inputs.docker_compose_down }}\` |"
          echo "| **1Password secrets** | \`${{ inputs.op_secret_files || 'none' }}\` |"
          echo "| **WireGuard** | \`${{ inputs.wg_config != '' && 'yes' || 'no' }}\` |"
          echo "| **Started** | \`${DEPLOY_START:-N/A}\` |"
          echo "| **Finished** | \`${DEPLOY_END}\` |"
          echo "| **Commit** | [\`${GITHUB_SHA::7}\`](https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}) |"
          if [ "${STATUS}" != "success" ]; then
            echo ""
            echo "### Failure Details"
            if [ -n "${{ env.DEPLOY_ERROR }}" ]; then
              echo "\`\`\`"
              echo "${{ env.DEPLOY_ERROR }}"
              echo "\`\`\`"
            else
              echo "See workflow logs for error details."
            fi
          fi
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Tear down WireGuard
      if: always() && inputs.wg_config != ''
      shell: bash
      run: sudo wg-quick down ${{ inputs.wireguard_interface }}
